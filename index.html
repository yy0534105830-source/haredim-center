<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | אוטומטי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --radius: 12px; --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: #1a1a1a; }
        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 5px solid var(--accent); }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin: 0; }
        
        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }
        
        .hero-section { display: flex; gap: 20px; height: 500px; margin-bottom: 40px; }
        .hero-main { flex: 1.5; position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #333; }
        .hero-side { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .hero-side-item { flex: 1; position: relative; border-radius: var(--radius); overflow: hidden; background: #333; }

        /* תיבת המבזקים */
        .hero-flashes { width: 340px; background: white; border-radius: var(--radius); border-top: 5px solid var(--danger); box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .flashes-head { padding: 15px; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-body { flex: 1; overflow-y: auto; padding: 5px; }
        
        .flash-row { padding: 12px; border-bottom: 1px solid #f0f0f0; font-weight: 700; font-size: 0.95rem; line-height: 1.4; color: #333; }
        .flash-time { color: var(--danger); font-size: 0.8rem; margin-left: 8px; font-weight: 800; }

        .overlay { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; width: 100%; box-sizing: border-box; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        @media (max-width: 1100px) { .hero-section { flex-direction: column; height: auto; } .hero-flashes { width: 100%; height: 350px; } }
    </style>
</head>
<body>

<header><h1>חדשות חרדים</h1></header>

<div class="container">
    <div class="hero-section">
        <div id="main-slot" class="hero-main"></div>
        <div id="side-slots" class="hero-side"></div>
        
        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקים אוטומטיים</div>
            <div id="flashes-list" class="flashes-body">
                <div style="padding:20px; text-align:center;">מנסה להתחבר למבזקים...</div>
            </div>
        </div>
    </div>
    <div id="grid-view" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;"></div>
</div>

<script>
    const userRepo = 'yy0534105830-source/news';
    const base = `https://raw.githubusercontent.com/${userRepo}/main/`;

    async function start() {
        loadArticles();
        fetchAutoFlashes();
    }

    // פונקציית המבזקים האוטומטית - מותאמת לעקיפת חסימות
    async function fetchAutoFlashes() {
        try {
            // אנחנו משתמשים במקור RSS של אתר חדשות ודרייבר שנועד לעקוף חסימות דפדפן
            const rssUrl = 'https://xml.mako.co.il/syndication/rss/v1.xml';
            const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
            
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            // פענוח ה-XML שהתקבל
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            let html = '';
            items.forEach((item, index) => {
                if(index < 15) { // 15 המבזקים האחרונים
                    const title = item.querySelector("title").textContent;
                    const pubDate = new Date(item.querySelector("pubDate").textContent);
                    const time = pubDate.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    html += `<div class="flash-row"><span class="flash-time">${time}</span>${title}</div>`;
                }
            });
            
            document.getElementById('flashes-list').innerHTML = html || 'אין מבזקים זמינים';
        } catch (e) {
            console.error("Flash Error:", e);
            document.getElementById('flashes-list').innerHTML = '<div style="padding:20px; text-align:center;">המבזקים יתעדכנו בקרוב (שגיאת חיבור)</div>';
        }
    }

    async function loadArticles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${userRepo}/contents/content/blog`);
            const files = await res.json();
            const articles = await Promise.all(files.reverse().slice(0, 10).map(async f => {
                const text = await (await fetch(f.download_url)).text();
                const m = { title: "כתבה", img: "", pos: "grid" };
                const lines = text.split('\n');
                lines.forEach(l => {
                    if(l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/"/g,'');
                    if(l.startsWith('position:')) m.pos = l.split(':')[1].trim();
                    if(l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim();
                        m.img = img.startsWith('http') ? img : base + "images/" + img;
                    }
                });
                return m;
            }));

            const main = articles.find(a => a.pos === 'main') || articles[0];
            if(main) {
                document.getElementById('main-slot').innerHTML = `
                    <img src="${main.img}" style="width:100%; height:100%; object-fit:cover;">
                    <div class="overlay"><h2>${main.title}</h2></div>`;
            }
            
            const sides = articles.filter(a => a.pos === 'stack').slice(0,2);
            document.getElementById('side-slots').innerHTML = sides.map(s => `
                <div class="hero-side-item">
                    <img src="${s.img}" style="width:100%; height:100%; object-fit:cover;">
                    <div class="overlay"><h3 style="margin:0; font-size:1.1rem;">${s.title}</h3></div>
                </div>`).join('');

            const grid = articles.filter(a => a.pos !== 'main' && a.pos !== 'stack');
            document.getElementById('grid-view').innerHTML = grid.map(g => `
                <div style="background:white; border-radius:12px; overflow:hidden; box-shadow:var(--shadow);">
                    <img src="${g.img}" style="width:100%; height:150px; object-fit:cover;">
                    <div style="padding:15px;"><h4 style="margin:0;">${g.title}</h4></div>
                </div>`).join('');

        } catch(e) {}
    }

    start();
</script>
</body>
</html>
