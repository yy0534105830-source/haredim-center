<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --radius: 12px; --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: #1a1a1a; overflow-x: hidden; }
        
        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 5px solid var(--accent); }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; }

        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; box-sizing: border-box; }

        /* --- Hero Grid המבנה הקשיח --- */
        .hero-layout { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 320px; 
            grid-template-rows: 500px;
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .hero-main { position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #222; cursor: pointer; }
        .hero-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .hero-small { position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #222; cursor: pointer; }

        /* תיבת המבזקים - נקייה לחלוטין */
        .hero-flashes { background: white; border-radius: var(--radius); border-top: 5px solid var(--danger); box-shadow: var(--shadow); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .flashes-head { padding: 15px; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-body { flex: 1; overflow-y: auto; }
        
        .flash-row { padding: 12px; border-bottom: 1px solid #f0f0f0; font-weight: 700; font-size: 0.95rem; line-height: 1.4; color: #333; transition: background 0.2s; }
        .flash-time { color: var(--danger); font-size: 0.8rem; margin-left: 8px; font-weight: 800; }

        .overlay { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; width: 100%; box-sizing: border-box; }
        .overlay h2, .overlay h3 { margin: 0; line-height: 1.2; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* התאמה לנייד */
        @media (max-width: 1100px) {
            .hero-layout { grid-template-columns: 1fr; grid-template-rows: auto; }
            .hero-main { height: 300px; }
            .hero-stack { height: 400px; }
            .hero-flashes { height: 400px; }
        }
    </style>
</head>
<body>

<header><h1>חדשות חרדים</h1></header>

<div class="container">
    <div class="hero-layout">
        <div id="main-slot" class="hero-main"></div>
        
        <div id="side-slots" class="hero-stack"></div>
        
        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקים</div>
            <div id="flashes-list" class="flashes-body">
                <div style="padding:20px; text-align:center; color:#888;">מעדכן...</div>
            </div>
        </div>
    </div>
    
    <div id="grid-view" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
</div>

<script>
    const userRepo = 'yy0534105830-source/news';
    const base = `https://raw.githubusercontent.com/${userRepo}/main/`;

    async function start() {
        loadArticles();
        fetchFlashes();
    }

    // פונקציית המבזקים - משתמשת בשירות המרה חיצוני כדי שנטפרי לא יזהו את המקור
    async function fetchFlashes() {
        try {
            // הכתובת של mako מוסתרת בתוך ה-URL של השירות המנקה
            const cleanUrl = "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fxml.mako.co.il%2Fsyndication%2Frss%2Fv1.xml";
            const res = await fetch(cleanUrl);
            const data = await res.json();
            
            if(data.status === 'ok') {
                const html = data.items.map(item => {
                    const time = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    return `<div class="flash-row"><span class="flash-time">${time}</span>${item.title}</div>`;
                }).join('');
                document.getElementById('flashes-list').innerHTML = html;
            }
        } catch (e) {
            document.getElementById('flashes-list').innerHTML = '<div style="padding:20px;">המבזקים יתעדכנו בקרוב</div>';
        }
    }

    async function loadArticles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${userRepo}/contents/content/blog`);
            const files = await res.json();
            const articles = await Promise.all(files.reverse().slice(0, 12).map(async f => {
                const text = await (await fetch(f.download_url)).text();
                const m = { title: "כתבה", img: "", pos: "grid" };
                text.split('\n').forEach(l => {
                    if(l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/"/g,'');
                    if(l.startsWith('position:')) m.pos = l.split(':')[1].trim();
                    if(l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim();
                        m.img = img.startsWith('http') ? img : base + "images/" + img;
                    }
                });
                return m;
            }));

            // השמה למבנה החדש
            const main = articles.find(a => a.pos === 'main') || articles[0];
            document.getElementById('main-slot').innerHTML = `
                <img src="${main.img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay"><h2>${main.title}</h2></div>`;
            
            const sides = articles.filter(a => a.pos === 'stack').slice(0,2);
            document.getElementById('side-slots').innerHTML = sides.map(s => `
                <div class="hero-small">
                    <img src="${s.img}" style="width:100%; height:100%; object-fit:cover;">
                    <div class="overlay"><h3 style="font-size:1.1rem;">${s.title}</h3></div>
                </div>`).join('');

            const others = articles.filter(a => a !== main && !sides.includes(a));
            document.getElementById('grid-view').innerHTML = others.map(g => `
                <div style="background:white; border-radius:12px; overflow:hidden; box-shadow:var(--shadow);">
                    <img src="${g.img}" style="width:100%; height:170px; object-fit:cover;">
                    <div style="padding:15px;"><h4 style="margin:0;">${g.title}</h4></div>
                </div>`).join('');
        } catch(e) {}
    }

    start();
</script>
</body>
</html>
