<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | מבזקים בימין</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --accent: #b8924a; --danger: #cc0000;
            --bg: #f0f2f5; --radius: 4px; --shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; direction: rtl; }

        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 5px solid var(--accent); }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; box-sizing: border-box; }

        /* --- ה-GRID הקשיח: מבזקים בצד ימין --- */
        .hero-grid {
            display: grid;
            /* 3 עמודות: ימין (מבזקים), מרכז (ראשית), שמאל (ערימה) */
            grid-template-columns: 320px 2fr 1fr;
            grid-template-areas: "flashes main side";
            gap: 20px;
            height: 550px;
            margin-bottom: 40px;
        }

        /* שיוך האלמנטים לאזורים ב-Grid */
        .hero-flashes { grid-area: flashes; background: white; border-radius: var(--radius); border-top: 5px solid var(--danger); box-shadow: --shadow; display: flex; flex-direction: column; overflow: hidden; }
        .hero-main { grid-area: main; position: relative; border-radius: var(--radius); overflow: hidden; background: #000; cursor: pointer; }
        .hero-side-stack { grid-area: side; display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        
        .side-item { position: relative; border-radius: var(--radius); overflow: hidden; background: #000; cursor: pointer; }

        /* עיצוב המבזקים */
        .flashes-head { background: #f8f9fa; padding: 15px; font-weight: 800; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; color: var(--primary); }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-content { flex: 1; overflow-y: auto; }
        .flash-row { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; font-weight: 700; line-height: 1.4; }
        .flash-row span { color: var(--danger); margin-left: 8px; font-size: 0.8rem; }

        /* עיצוב כותרות על תמונות */
        .overlay { position: absolute; bottom: 0; right: 0; left: 0; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
        .overlay h2 { margin: 5px 0 0; font-size: 1.6rem; font-family: 'Frank Ruhl Libre', serif; line-height: 1.2; }
        .cat-label { background: var(--accent); color: white; padding: 2px 8px; font-size: 0.75rem; font-weight: 800; }

        img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* התאמה לניידים */
        @media (max-width: 1100px) {
            .hero-grid { grid-template-columns: 1fr; grid-template-areas: "main" "flashes" "side"; height: auto; }
            .hero-main { height: 300px; }
            .hero-flashes, .hero-side-stack { height: 450px; }
        }
    </style>
</head>
<body>

<header><h1>חדשות חרדים</h1></header>

<div class="container">
    <div class="hero-grid">
        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקים אחרונים</div>
            <div id="flash-list" class="flashes-content">
                <div style="padding:20px; text-align:center;">טוען מבזקים...</div>
            </div>
        </div>

        <div id="main-news" class="hero-main"></div>

        <div id="side-news" class="hero-side-stack"></div>
    </div>

    <div id="bottom-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
</div>

<script>
    const REPO_NAME = 'yy0534105830-source/news';
    const GITHUB_RAW = `https://raw.githubusercontent.com/${REPO_NAME}/main/`;

    async function start() {
        getJDN();
        getGitHub();
    }

    async function getJDN() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.jdn.co.il%2Ffeed%2F');
            const data = await res.json();
            if(data.status === 'ok') {
                document.getElementById('flash-list').innerHTML = data.items.map(i => {
                    const time = new Date(i.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                    return `<div class="flash-row"><span>${time}</span>${i.title}</div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function getGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/content/blog`);
            const files = await res.json();
            const arts = await Promise.all(files.reverse().map(async f => {
                const text = await (await fetch(f.download_url)).text();
                const obj = { title: "כתבה", cat: "חדשות", img: "", pos: "grid" };
                text.split('\n').forEach(line => {
                    if(line.startsWith('title:')) obj.title = line.split(':')[1].trim().replace(/"/g,'');
                    if(line.startsWith('category:')) obj.cat = line.split(':')[1].trim();
                    if(line.startsWith('position:')) obj.pos = line.split(':')[1].trim();
                    if(line.startsWith('thumbnail:')) {
                        let t = line.split(':')[1].trim();
                        obj.img = t.startsWith('http') ? t : GITHUB_RAW + "images/" + t;
                    }
                });
                return obj;
            }));

            // השמה לכתבה ראשית
            const main = arts.find(a => a.pos === 'main') || arts[0];
            document.getElementById('main-news').innerHTML = `
                <img src="${main.img}" onerror="this.src='https://via.placeholder.com/800x500'">
                <div class="overlay"><span class="cat-label">${main.cat}</span><h2>${main.title}</h2></div>`;

            // השמה לשתי כתבות הצד
            const side = arts.filter(a => a.pos === 'stack').slice(0, 2);
            document.getElementById('side-news').innerHTML = side.map(s => `
                <div class="side-item">
                    <img src="${s.img}" onerror="this.src='https://via.placeholder.com/400x300'">
                    <div class="overlay"><h2 style="font-size:1.1rem;">${s.title}</h2></div>
                </div>`).join('');

            // שאר הכתבות למטה
            const others = arts.filter(a => a !== main && !side.includes(a));
            document.getElementById('bottom-grid').innerHTML = others.map(o => `
                <div style="background:white; border-radius:4px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                    <div style="height:160px;"><img src="${o.img}"></div>
                    <div style="padding:15px;"><h4 style="margin:0;">${o.title}</h4></div>
                </div>`).join('');

        } catch(e) {}
    }

    start();
</script>
</body>
</html>
